# .github/workflows/deploy.yml
name: Build and Deploy

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    env:
      NAMESPACE: eks-project-staging
      BACKEND_REPOSITORY: dotnet-app
      FRONTEND_REPOSITORY: react-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ./React-Frontend/package-lock.json

      - name: Build frontend assets
        working-directory: ./React-Frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend build output
        working-directory: ./React-Frontend
        run: |
          test -f ./dist/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build -f ./DotNet-Backend/Dockerfile -t ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }} ./DotNet-Backend

      - name: Push backend image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }}

      - name: Build frontend image
        run: |
          docker build -f ./React-Frontend/Dockerfile -t ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }} ./React-Frontend

      - name: Push frontend image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create backend secret
        run: |
          kubectl create secret generic backend-secret \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_NAME=${{ vars.DB_NAME }} \
            --from-literal=DB_USER=${{ vars.DB_USER }} \
            --from-literal=DB_PORT=${{ vars.DB_PORT }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend with Helm
        run: |
          helm upgrade --install backend ./infra/helm/backend \
            --create-namespace \
            --namespace ${{ env.NAMESPACE }} \
            -f ./infra/helm/backend/values-staging.yaml \
            --wait \
            --timeout 5m \
            --debug \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }} \
            --set image.tag=${{ github.sha }}

      - name: Deploy frontend with Helm
        run: |
          helm upgrade --install frontend ./infra/helm/frontend \
            --create-namespace \
            --namespace ${{ env.NAMESPACE }} \
            -f ./infra/helm/frontend/values-staging.yaml \
            --wait \
            --timeout 5m \
            --debug \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }} \
            --set image.tag=${{ github.sha }}

      - name: Collect staging diagnostics on failure
        if: failure()
        run: |
          kubectl get all,ingress,pvc -n ${{ env.NAMESPACE }} || true
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by=.metadata.creationTimestamp || true
          helm status backend -n ${{ env.NAMESPACE }} || true
          helm status frontend -n ${{ env.NAMESPACE }} || true

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      NAMESPACE: eks-project-production
      BACKEND_REPOSITORY: dotnet-app
      FRONTEND_REPOSITORY: react-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ./React-Frontend/package-lock.json

      - name: Build frontend assets
        working-directory: ./React-Frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend build output
        working-directory: ./React-Frontend
        run: |
          test -f ./dist/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build -f ./DotNet-Backend/Dockerfile -t ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }} ./DotNet-Backend

      - name: Push backend image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }}

      - name: Build frontend image
        run: |
          docker build -f ./React-Frontend/Dockerfile -t ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }} ./React-Frontend

      - name: Push frontend image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Verify cluster access
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create backend secret
        run: |
          kubectl create secret generic backend-secret \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_NAME=${{ vars.DB_NAME }} \
            --from-literal=DB_USER=${{ vars.DB_USER }} \
            --from-literal=DB_PORT=${{ vars.DB_PORT }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend with Helm
        run: |
          helm upgrade --install backend ./infra/helm/backend \
            --create-namespace \
            --namespace ${{ env.NAMESPACE }} \
            -f ./infra/helm/backend/values-production.yaml \
            --wait \
            --timeout 5m \
            --debug \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }} \
            --set image.tag=${{ github.sha }}

      - name: Deploy frontend with Helm
        run: |
          helm upgrade --install frontend ./infra/helm/frontend \
            --create-namespace \
            --namespace ${{ env.NAMESPACE }} \
            -f ./infra/helm/frontend/values-production.yaml \
            --wait \
            --timeout 5m \
            --debug \
            --set image.repository=${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }} \
            --set image.tag=${{ github.sha }}

      - name: Collect production diagnostics on failure
        if: failure()
        run: |
          kubectl get all,ingress,pvc -n ${{ env.NAMESPACE }} || true
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by=.metadata.creationTimestamp || true
          helm status backend -n ${{ env.NAMESPACE }} || true
          helm status frontend -n ${{ env.NAMESPACE }} || true
