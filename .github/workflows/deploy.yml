# .github/workflows/deploy.yml
name: Build and Deploy

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    env:
      NAMESPACE: eks-project-staging
      BACKEND_REPOSITORY: dotnet-app
      FRONTEND_REPOSITORY: react-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build -t ${{ vars.ECR_REGISTRY }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }} ./DotNet-Backend

      - name: Push backend image
        run: |
          docker push ${{ vars.ECR_REGISTRY }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }}

      - name: Build frontend image
        run: |
          docker build -t ${{ vars.ECR_REGISTRY }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }} ./React-Frontend

      - name: Push frontend image
        run: |
          docker push ${{ vars.ECR_REGISTRY }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create backend secret
        run: |
          kubectl create secret generic backend-secret \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_NAME=${{ vars.DB_NAME }} \
            --from-literal=DB_USER=${{ vars.DB_USER }} \
            --from-literal=DB_PORT=${{ vars.DB_PORT }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend with Helm
        run: |
          helm upgrade --install backend ./infra/helm/backend \
            --namespace ${{ env.NAMESPACE }} \
            -f ./infra/helm/backend/values-staging.yaml \
            --set image.repository=${{ vars.ECR_REGISTRY }}/${{ env.BACKEND_REPOSITORY }} \
            --set image.tag=${{ github.sha }}

      - name: Deploy frontend with Helm
        run: |
          helm upgrade --install frontend ./infra/helm/frontend \
            --namespace ${{ env.NAMESPACE }} \
            -f ./infra/helm/frontend/values-staging.yaml \
            --set image.repository=${{ vars.ECR_REGISTRY }}/${{ env.FRONTEND_REPOSITORY }} \
            --set image.tag=${{ github.sha }}

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      NAMESPACE: eks-project-production
      BACKEND_REPOSITORY: dotnet-app
      FRONTEND_REPOSITORY: react-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build -t ${{ vars.ECR_REGISTRY }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }} ./DotNet-Backend

      - name: Push backend image
        run: |
          docker push ${{ vars.ECR_REGISTRY }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }}

      - name: Build frontend image
        run: |
          docker build -t ${{ vars.ECR_REGISTRY }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }} ./React-Frontend

      - name: Push frontend image
        run: |
          docker push ${{ vars.ECR_REGISTRY }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create backend secret
        run: |
          kubectl create secret generic backend-secret \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
            --from-literal=DB_NAME=${{ vars.DB_NAME }} \
            --from-literal=DB_USER=${{ vars.DB_USER }} \
            --from-literal=DB_PORT=${{ vars.DB_PORT }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend with Helm
        run: |
          helm upgrade --install backend ./infra/helm/backend \
            --namespace ${{ env.NAMESPACE }} \
            -f ./infra/helm/backend/values-production.yaml \
            --set image.repository=${{ vars.ECR_REGISTRY }}/${{ env.BACKEND_REPOSITORY }} \
            --set image.tag=${{ github.sha }}

      - name: Deploy frontend with Helm
        run: |
          helm upgrade --install frontend ./infra/helm/frontend \
            --namespace ${{ env.NAMESPACE }} \
            -f ./infra/helm/frontend/values-production.yaml \
            --set image.repository=${{ vars.ECR_REGISTRY }}/${{ env.FRONTEND_REPOSITORY }} \
            --set image.tag=${{ github.sha }}